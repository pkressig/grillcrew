name: grillcrew-fctc

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grillcrew}
      POSTGRES_USER: ${POSTGRES_USER:-grillcrew}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grillcrew_dev_only}
      TZ: Europe/Zurich
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grillcrew} -d ${POSTGRES_DB:-grillcrew}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-grillcrew}:${POSTGRES_PASSWORD:-grillcrew_dev_only}@db:5432/${POSTGRES_DB:-grillcrew}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/code
      - frontend_node_modules:/code/node_modules
    command: npm run dev

volumes:
  db_data:
  frontend_node_modules:
