name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Lint, Typecheck, Tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: grillcrew_test
          POSTGRES_USER: grillcrew
          POSTGRES_PASSWORD: grillcrew_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grillcrew -d grillcrew_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://grillcrew:grillcrew_test@localhost:5432/grillcrew_test
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff (Lint + Format)
        run: |
          ruff check .
          ruff format --check .
      - name: mypy (strict)
        run: mypy app tests
      - name: Alembic migration up/down
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Tests
        run: pytest

  frontend:
    name: Frontend (Lint, Typecheck, Tests, Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
